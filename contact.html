<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Your Name</title>
  <link rel="stylesheet" href="styles.css?v=4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="layout">

    <main class="main">
      <div class="panel">
        <p class="section-label">Get in Touch</p>
        <h1 class="page-title">Let's discuss<br>your project.</h1>
      </div>

      <div class="panel">
        <div class="contact-grid">
          <form class="contact-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
              <label>Your Name</label>
              <input type="text" placeholder="王瑀萱｜大胃" required />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="you@company.com" required />
            </div>
            <div class="form-group">
              <label>Service</label>
              <select>
                <option value="">Select a service...</option>
                <option>UI/UX Design</option>
                <option>Brand Design</option>
                <option>Product Design</option>
                <option>Design Consultancy</option>
                <option>Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Budget Range</label>
              <select>
                <option value="">Select a range...</option>
                <option>Under $3,000</option>
                <option>$3,000 – $8,000</option>
                <option>$8,000 – $20,000</option>
                <option>$20,000+</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tell Me About Your Project</label>
              <textarea placeholder="Describe your project, goals, timeline..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Send Message ↗</button>
            <p id="form-status" class="contact-form-status"></p>
          </form>

          <div class="contact-info">
            <div>
              <p class="section-label">Direct Contact</p>
              <div class="contact-info-group">
                <div class="contact-detail-label">Email</div>
                <a href="mailto:hello@youremail.com" class="contact-detail-value contact-email-link">hello@youremail.com</a>
              </div>
              <div class="contact-info-group">
                <div class="contact-detail-label">Based In</div>
                <div class="contact-detail-value">[Your City, Country]</div>
              </div>
              <div class="contact-info-group">
                <div class="contact-detail-label">Response Time</div>
                <div class="contact-detail-value">Within 24 hours</div>
              </div>
            </div>
            <div>
              <p class="section-label">Book a Call</p>
              <p class="contact-booking-desc">Schedule a free 30-minute discovery call to discuss your project.</p>
              <a href="#" class="btn btn-outline">Book a Call ↗</a>
            </div>
            <div>
              <p class="section-label">Follow Me</p>
              <div class="contact-social-row">
                <a href="#" class="btn btn-outline btn-xs">LinkedIn</a>
                <a href="#" class="btn btn-outline btn-xs">Behance</a>
                <a href="#" class="btn btn-outline btn-xs">Dribbble</a>
                <a href="#" class="btn btn-outline btn-xs">Instagram</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/sidebar.js"></script>
</body>
</html>
